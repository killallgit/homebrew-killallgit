name: Update Formula

on:
  repository_dispatch:
    types: [formula-update]
  workflow_dispatch:
    inputs:
      formula:
        description: 'Formula name (e.g., killallgit, killalltofu)'
        required: true
        type: string
      version:
        description: 'Version to update to (without v prefix)'
        required: true
        type: string
      macos_arm64_sha256:
        description: 'SHA256 for macOS ARM64'
        required: true
        type: string
      macos_x86_64_sha256:
        description: 'SHA256 for macOS x86_64'
        required: true
        type: string
      linux_x86_64_sha256:
        description: 'SHA256 for Linux x86_64'
        required: true
        type: string
      linux_arm64_sha256:
        description: 'SHA256 for Linux ARM64'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables from dispatch
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            FORMULA="${{ github.event.client_payload.formula }}"
            echo "formula=${FORMULA:-killallgit}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "macos_arm64_sha256=${{ github.event.client_payload.macos_arm64_sha256 }}" >> $GITHUB_OUTPUT
            echo "macos_x86_64_sha256=${{ github.event.client_payload.macos_x86_64_sha256 }}" >> $GITHUB_OUTPUT
            echo "linux_x86_64_sha256=${{ github.event.client_payload.linux_x86_64_sha256 }}" >> $GITHUB_OUTPUT
            echo "linux_arm64_sha256=${{ github.event.client_payload.linux_arm64_sha256 }}" >> $GITHUB_OUTPUT
          else
            echo "formula=${{ inputs.formula }}" >> $GITHUB_OUTPUT
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "macos_arm64_sha256=${{ inputs.macos_arm64_sha256 }}" >> $GITHUB_OUTPUT
            echo "macos_x86_64_sha256=${{ inputs.macos_x86_64_sha256 }}" >> $GITHUB_OUTPUT
            echo "linux_x86_64_sha256=${{ inputs.linux_x86_64_sha256 }}" >> $GITHUB_OUTPUT
            echo "linux_arm64_sha256=${{ inputs.linux_arm64_sha256 }}" >> $GITHUB_OUTPUT
          fi

      - name: Update Formula
        env:
          FORMULA: ${{ steps.vars.outputs.formula }}
          VERSION: ${{ steps.vars.outputs.version }}
          MACOS_ARM64_SHA: ${{ steps.vars.outputs.macos_arm64_sha256 }}
          MACOS_X86_64_SHA: ${{ steps.vars.outputs.macos_x86_64_sha256 }}
          LINUX_X86_64_SHA: ${{ steps.vars.outputs.linux_x86_64_sha256 }}
          LINUX_ARM64_SHA: ${{ steps.vars.outputs.linux_arm64_sha256 }}
        run: |
          FORMULA_FILE="Formula/${FORMULA}.rb"

          if [ ! -f "$FORMULA_FILE" ]; then
            echo "Formula not found: $FORMULA_FILE"
            exit 1
          fi

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA_FILE"

          # Update sha256 values in order of appearance:
          # 1. macos arm64, 2. macos x86_64, 3. linux arm64, 4. linux x86_64
          python3 -c "
          import re, sys

          with open('${FORMULA_FILE}') as f:
              content = f.read()

          shas = ['${MACOS_ARM64_SHA}', '${MACOS_X86_64_SHA}', '${LINUX_ARM64_SHA}', '${LINUX_X86_64_SHA}']
          idx = 0

          def replace_sha(match):
              global idx
              if idx < len(shas):
                  result = f'sha256 \"{shas[idx]}\"'
                  idx += 1
                  return result
              return match.group(0)

          content = re.sub(r'sha256 \"[a-fA-F0-9]+\"', replace_sha, content)
          content = re.sub(r'sha256 \"PLACEHOLDER\"', replace_sha, content)

          with open('${FORMULA_FILE}', 'w') as f:
              f.write(content)
          "

          echo "Updated formula:"
          cat "$FORMULA_FILE"

      - name: Commit and Push
        env:
          FORMULA: ${{ steps.vars.outputs.formula }}
          VERSION: ${{ steps.vars.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          git diff --staged --quiet || git commit -m "Update ${FORMULA} to v${VERSION}"
          git push
